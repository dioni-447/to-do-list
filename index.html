<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projeto de estudo de uma to-do-list.">
    <link rel="stylesheet" type="text/css" href="static/css/estilo.css">
    
<title>To-do List</title>
</head>
<body>
    <header><h1>To-Do List</h1></header>
<main>
    <section id="sessao1">
        <div id="lista-tarefas"></div>
    </section>
    <br><hr><br>
    <section class="interagir">
        <div>
            <label for="titulo">Insira um título para a tarefa:</label>
            <input type="text" id="titulo" name="titulo" placeholder="Titulo da tarefa"><br>
            <label for="descricao">Insira uma descrição para a tarefa:</label>
            <input type="text" id="descricao" name="descricao" placeholder="Descrição da tarefa"><br>
            <label for="prazo">Insira um prazo para a tarefa:</label>
            <input type="date" id="prazo" name="prazo"><br>
            <div class="botao">
            <button type="button" id="criar">Criar tarefa</button>
            </div>
        </div>
    </section>
</main>




    <footer>informações para contato:koekokfoek</footer>
<script src="static/js/script.js"></script>
</body>

</html>
